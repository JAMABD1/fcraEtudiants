{% extends "main/base.html" %}
{% load static %}
{% block title %} Madrassah {% endblock %}
{% block content %}
<script>
    function openModal(imageUrl) {
        document.getElementById('modalImage').src = imageUrl;
        document.getElementById('imageModal').classList.remove('hidden');
    }

    window.openModal = openModal;

    document.addEventListener('DOMContentLoaded', function() {
        var imageModal = document.getElementById('imageModal');
        var closeModalBtn = document.getElementById('closeModal');
        if (closeModalBtn) {
            closeModalBtn.onclick = function() {
                imageModal.classList.add('hidden');
            };
        }
        if (imageModal) {
            imageModal.addEventListener('click', function(event) {
                if (event.target === imageModal) {
                    imageModal.classList.add('hidden');
                }
            });
        }
    });
</script>

<div class="p-6">
    <h1 class="text-2xl font-bold mb-4">Liste des Étudiants de Madrassah</h1>
    {% include 'main/components/TableMadrassah.html' with datas=madrassahs %}
</div>

<div id="imageModal" class="fixed inset-0 bg-black/50 items-center justify-center hidden z-50 flex">
    <div class="bg-white rounded-lg p-4 relative max-w-[90vw] max-h-[90vh]">
        <span id="closeModal" class="absolute top-2 right-2 cursor-pointer text-gray-600 text-2xl leading-none">&times;</span>
        <img id="modalImage" src="" alt="Profile" class="max-w-full max-h-[80vh] object-contain" />
    </div>
</div>
{% endblock content %}
