<html>
    <head>
    <link href="style.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
    <script type='text/javascript' src='https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js'></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
    </head>
    <body>

     {% for item in profile %}   
        <!-- Student Profile -->
<div class="student-profile py-4">
    <div class="container">
      <div class="row">
        <div class="col-lg-4">
          <div class="card shadow-sm">
            <div class="card-header bg-transparent text-center">
              <img class="profile_img" src="/media/{{item.avatar}}" alt="" width="250px" height="250px" style="border-radius:250px">
              <h3>{{item.name}}</h3>
            </div>
            <div class="card-body">
              <p class="mb-0"><strong class="pr-1">Username:</strong>{{username}}</p>
              <p class="mb-0"><strong class="pr-1">Section:</strong>{{item.section}}</p>
              <p class="mb-0"><strong class="pr-1">Travail:</strong>{{item.job}}</p>
              
             
            </div>
          </div>
        </div>
        <div class="col-lg-8">
          <div class="card shadow-sm">
            <div class="card-header bg-transparent border-0">
              <h3 class="mb-0"><i class="far fa-clone pr-1"></i>General Information</h3>
            </div>
            <div class="card-body pt-0">
              <table class="table table-bordered">
                
              
                 
                <tr>
                  <th width="30%">Telephone</th>
                  <td width="2%">:</td>
                  <td>{{item.telephone}}</td>
                </tr>
                

                  <tr>
                    <th width="30%">Email</th>
                    <td width="2%">:</td>
                    <td>{{item.email}}</td>
                  </tr>

                 


              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  {% endfor %}
  
    </body>
    </html>
