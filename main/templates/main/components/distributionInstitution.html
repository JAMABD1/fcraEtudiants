<div class="bg-white p-6 rounded-lg shadow-md w-full max-w-xl">
    <h1 class="text-2xl font-bold text-green-600 text-center mb-4">Enrolled by Institution</h1>

    <!-- Center Filter Dropdown -->
    <div class="mb-4">
        <select id="centerSelect" class="block w-full p-2 border border-gray-300 rounded-md">
            <option value="">Tous les Centres</option>
            <option value="Antaniavo">Antaniavo</option>
            <option value="Ankarobato">Ankarobato</option>
            <option value="Manakara">Manakara</option>
            <option value="Andakana">Andakana</option>
            <option value="Sakoana">Sakoana</option>
        </select>
    </div>

    <canvas id="institutionChart" width="400" height="200"></canvas>
</div>

<script>
document.getElementById('centerSelect').addEventListener('change', function() {
    const center = this.value;

    fetch(`/api/enrolled-institution-distribution/?center=${center}`)
        .then(response => response.json())
        .then(data => {
            // Destroy existing chart if it exists
            if (window.myChart) {
                window.myChart.destroy();
            }

            const ctx = document.getElementById('institutionChart').getContext('2d');
            window.myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: data.labels,
                    datasets: [{
                        label: 'Enrolled by Institution',
                        data: data.data,
                        backgroundColor: data.labels.map(() => `rgba(${Math.floor(Math.random() * 255)}, ${Math.floor(Math.random() * 255)}, ${Math.floor(Math.random() * 255)}, 0.6)`),
                        borderColor: 'rgba(75, 192, 192, 1)',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: {
                            beginAtZero: true,
                            title: {
                                display: true,
                                text: 'Number of Students'
                            }
                        },
                        x: {
                            title: {
                                display: true,
                                text: 'Institutions'
                            }
                        }
                    }
                }
            });
        })
        .catch(error => console.error('Error fetching data:', error));
});
</script>
