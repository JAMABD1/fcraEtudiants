<div class="relative">
  <input
      type="text"
      placeholder="Rechercher des utilisateurs..."
      class="block w-full p-3 border border-gray-300 rounded-full shadow-sm focus:ring-2 focus:ring-green-300 focus:outline-none"
      id="userSearch"
      oninput="filterUsers()"
    />
  </div>

  <!-- Users List (scrollable) -->
  <div id="usersList" class="flex flex-col space-y-4 overflow-y-auto h-64">
    <!-- User items will be injected by JavaScript here -->
  </div>

  <!-- Chat Section (Initially Hidden) -->
  <div id="chatSection" class="hidden flex flex-col h-full bg-white rounded-lg shadow-lg p-4 w-full">
    <!-- Back Button (Arrow) -->
    <button class="flex items-center mb-4 text-gray-700" onclick="goBack()">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
      </svg>
      <span class="ml-2">Retour</span>
    </button>

    <!-- Chat Top Bar -->
    <div class="flex items-center mb-4 ">
      <img src="https://via.placeholder.com/50" alt="User" id="chatUserImage" class="w-10 h-10 rounded-full object-cover">
      <h2 id="chatUserName" class="ml-4 font-semibold text-gray-700">John Doe</h2>
    </div>

    <!-- Chat Body (Scrollable, with fixed height) -->
    <div class="flex-1 overflow-y-auto p-4 space-y-4 max-h-[800px]" id="chatBody">
      <!-- Messages will be injected by JavaScript -->
      <div class="message bg-gray-200 p-3 rounded-lg">Hello! How are you?</div>
      <div class="message bg-green-200 p-3 rounded-lg text-right">I'm good! Thanks for asking.</div>
      <div class="message bg-gray-200 p-3 rounded-lg">What about you?</div>
      <div class="message bg-green-200 p-3 rounded-lg text-right">I'm doing well too!</div>
    </div>

    <!-- Chat Input (Positioned Absolute at Bottom) -->
    <div class="  w-full p-4 bg-white border-t">
      <textarea
        id="messageInput"
        placeholder="Écrire un message..."
        class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-300 focus:outline-none resize-none"
      ></textarea>
      <button class="mt-2 w-full py-2 bg-green-500 text-white rounded-lg shadow-md hover:bg-green-600" onclick="sendMessage()">
        Envoyer
      </button>
    </div>
  </div>
</div>

<script src="/static/javascript/Chat.js"></script>
